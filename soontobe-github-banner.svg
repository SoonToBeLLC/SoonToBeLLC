    <path d="M150 125c20-31 52-31 72 0" stroke="#EAF2FB" stroke-width="8" stroke-linecap="round" opacity=".9"/>
    <path d="M128 226c22-47 94-47 116 0" stroke="#EAF2FB" stroke-width="9" stroke-linecap="round" opacity=".9"/>
