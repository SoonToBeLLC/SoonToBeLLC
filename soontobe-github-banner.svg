<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SoonToBe LLC GitHub Profile Banner</title>
  <desc id="desc">A coded SVG banner for Tyler Sheffield and SoonToBe LLC.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070B"/>
      <stop offset="0.5" stop-color="#0A1220"/>
      <stop offset="1" stop-color="#02040A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .title { font: 800 62px Segoe UI, Arial, sans-serif; letter-spacing: 8px; fill: #F4F7FB; }
      .blue { fill: #268BFF; }
      .subtitle { font: 500 17px Segoe UI, Arial, sans-serif; letter-spacing: 8px; fill: #CED8E3; }
      .small { font: 600 13px Segoe UI, Arial, sans-serif; fill: #A9B8C8; }
      .panelTitle { font: 800 16px Segoe UI, Arial, sans-serif; fill: #3D9BFF; letter-spacing: 1px; }
      .panelText { font: 700 14px Segoe UI, Arial, sans-serif; fill: #EEF5FF; }
      .mini { font: 700 15px Segoe UI, Arial, sans-serif; fill: #F4F7FB; }
      .stroke { stroke: #5B7C99; stroke-width: 1.2; opacity: .55; }
    </style>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <g opacity="0.13" font-family="Consolas, Monaco, monospace" font-size="12" fill="#8FB7E5">
    <text x="410" y="34">import Claude from "@anthropic-ai/sdk";</text>
    <text x="410" y="54">const strategy = await build({ vision, roadmap, systems });</text>
    <text x="410" y="74">export const product = ship(aiWorkflow);</text>
    <text x="850" y="34">type Stack = "Claude" | "Next.js" | "Supabase" | "Vercel";</text>
    <text x="850" y="54">const mission = "strategy.code.automate.elevate";</text>
  </g>
  <g>
