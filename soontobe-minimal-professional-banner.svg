<svg width="1280" height="300" viewBox="0 0 1280 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SoonToBe, LLC Minimal Professional Banner</title>
  <desc id="desc">Minimal clean GitHub README banner for SoonToBe, LLC.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1280" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060A11"/>
      <stop offset="55%" stop-color="#0B1624"/>
      <stop offset="100%" stop-color="#060A11"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B7C99" stop-opacity="0"/>
      <stop offset="50%" stop-color="#5B7C99"/>
      <stop offset="100%" stop-color="#5B7C99" stop-opacity="0"/>
    </linearGradient>

    <style>
      .company { font-family: Arial, Helvetica, sans-serif; font-size: 58px; font-weight: 800; letter-spacing: 8px; fill: #F4F7FB; }
      .blue { fill: #5B7C99; }
      .tagline { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 4px; fill: #D5DEE8; }
      .stack { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 2px; fill: #B6C5D4; }
      .footer { font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 6px; fill: #8FA6BA; }
      .code { font-family: Consolas, Monaco, monospace; font-size: 12px; fill: #6E9FCB; opacity: 0.10; }
    </style>
  </defs>

  <rect width="1280" height="300" fill="url(#background)"/>

  <g opacity="0.06" stroke="#5B7C99" stroke-width="1">
    <path d="M0 60H1280M0 120H1280M0 180H1280M0 240H1280"/>
    <path d="M160 0V300M320 0V300M480 0V300M640 0V300M800 0V300M960 0V300M1120 0V300"/>
  </g>

  <g class="code">
    <text x="82" y="64">const mission = "build AI products that solve real business problems";</text>
    <text x="82" y="84">const stack = ["Claude", "Cursor", "Next.js", "Supabase", "Vercel"];</text>
    <text x="855" y="64">currentlyBuilding = ["TradePlot", "EchoPulse"];</text>
    <text x="855" y="84">focus = ["AI Strategy", "Product Development", "Automation"];</text>
  </g>

  <line x1="90" y1="42" x2="1190" y2="42" stroke="url(#accent)" stroke-width="2"/>
  <line x1="90" y1="258" x2="1190" y2="258" stroke="url(#accent)" stroke-width="2"/>

  <text x="640" y="128" text-anchor="middle" class="company">SOONTOBE<tspan class="blue">, LLC</tspan></text>
  <text x="640" y="165" text-anchor="middle" class="tagline">BUILDING AI PRODUCTS THAT SOLVE REAL BUSINESS PROBLEMS</text>
  <text x="640" y="204" text-anchor="middle" class="stack">ANTHROPIC CLAUDE  •  CURSOR AI  •  NEXT.JS  •  SUPABASE  •  VERCEL  •  GITHUB</text>
  <text x="640" y="237" text-anchor="middle" class="footer">STRATEGY  •  CODE  •  AUTOMATE  •  ELEVATE</text>
</svg>